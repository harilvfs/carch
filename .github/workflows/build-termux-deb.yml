name: Build Termux Deb

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.1)'
        required: true

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [aarch64, arm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dpkg tools
        run: sudo apt-get install -y dpkg

      - name: Build .deb for ${{ matrix.arch }}
        run: bash packaging/build-termux-deb.sh ${{ matrix.arch }}
        env:
          PKGVER: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
