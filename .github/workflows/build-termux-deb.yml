name: Build Termux Deb

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.1)'
        required: true
  release:
    types: [prereleased]

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [aarch64, arm]

    steps:
      - name: Install dpkg tools
        run: sudo apt-get install -y dpkg

      - name: Download build script
        run: |
          curl -fsSL "https://raw.githubusercontent.com/carch-org/pkgs/refs/heads/main/build-termux-deb.sh" \
            -o build-termux-deb.sh

      - name: Build .deb for ${{ matrix.arch }}
        run: bash build-termux-deb.sh ${{ matrix.arch }}
        env:
          PKGVER: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
