name: Release

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Release tag (e.g., v1.1.1)'
        required: true
        type: string
      tag_title:
        description: 'Release title (e.g., v1.1.1@Y-M-D)'
        required: true
        type: string
      update_version:
        description: 'Do you want to update the version in the repository?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up version variables
        run: |
          VERSION=$(echo "${{ github.event.inputs.tag_version }}" | sed 's/^v//')
          CURRENT_MONTH=$(date +'%B')
          CURRENT_YEAR=$(date +'%Y')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "CURRENT_MONTH=$CURRENT_MONTH" >> $GITHUB_ENV
          echo "CURRENT_YEAR=$CURRENT_YEAR" >> $GITHUB_ENV

      - name: Debug input values
        run: |
          echo "Update version input: '${{ github.event.inputs.update_version }}'"
          echo "Update version type: $(echo '${{ github.event.inputs.update_version }}' | wc -c)"

      - name: Update Cargo.toml version
        if: ${{ github.event.inputs.update_version == 'true' }}
        run: |
          sed -i "/\[workspace.package\]/,/^\[/ s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Update carch-core version in carch-cli
        if: ${{ github.event.inputs.update_version == 'true' }}
        run: |
          sed -i "s/carch-core = { path = \"..\/carch-core\", version = \".*\" }/carch-core = { path = \"..\/carch-core\", version = \"$VERSION\" }/" ./carch-cli/Cargo.toml

      - name: Install Rust (nightly) with MUSL targets
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-12-31
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Install rust-src
        run: rustup component add rust-src --toolchain nightly-2025-12-31

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Run cargo build to update Cargo.lock
        if: ${{ github.event.inputs.update_version == 'true' }}
        run: cargo build --release

      - name: Commit version changes
        if: ${{ github.event.inputs.update_version == 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Cargo.toml ./carch-cli/Cargo.toml Cargo.lock
          git commit -m "chore(release): bump version"
          git push

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-rs for cross-compilation
        run: cargo install cross

      - name: Build x86_64 binary
        run: |
          cargo build \
            --release \
            --verbose \
            --target-dir=build \
            --target=x86_64-unknown-linux-musl \
            --all-features

      - name: Build aarch64 binary (with cross)
        run: |
          cross build \
            --release \
            --verbose \
            --target-dir=build \
            --target=aarch64-unknown-linux-musl \
            --all-features
          mv ./build/aarch64-unknown-linux-musl/release/carch ./build/aarch64-unknown-linux-musl/release/carch-aarch64

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: compiled-binaries
          path: |
            ./build/x86_64-unknown-linux-musl/release/carch
            ./build/aarch64-unknown-linux-musl/release/carch-aarch64
          retention-days: 1

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        with:
          version: "v2.9.1"
          config: cliff.toml
          args: --unreleased --strip header
        env:
          OUTPUT: BODY.md

      - name: Add banner & release header
        run: |
          sed -i '/^## \[unreleased\]/d' BODY.md
          BANNER="![Carch Banner](https://raw.githubusercontent.com/harilvfs/assets/refs/heads/main/carch/carch.jpg)"
          printf "%s\n\n## What's Changed\n\n%s\n" "$BANNER" "$(cat BODY.md)" > BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_version }}
          name: ${{ github.event.inputs.tag_title }}
          draft: false
          prerelease: true
          generate_release_notes: false
          body_path: BODY.md

      - name: Upload Linux binaries to release
        run: |
          gh release upload ${{ github.event.inputs.tag_version }} \
            ./build/x86_64-unknown-linux-musl/release/carch \
            ./build/aarch64-unknown-linux-musl/release/carch-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Rust (nightly) with Android targets
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-12-31
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install rust-src
        run: rustup component add rust-src --toolchain nightly-2025-12-31

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-android-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-android-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-android-

      - name: Install cross
        run: cargo install cross

      - name: Build aarch64 Android binary
        run: |
          cross build \
            --release \
            --target-dir=build \
            --target=aarch64-linux-android \
            --all-features
          mv ./build/aarch64-linux-android/release/carch \
             ./build/aarch64-linux-android/release/carch-aarch64-android

      - name: Build armv7 Android binary
        run: |
          cross build \
            --release \
            --target-dir=build \
            --target=armv7-linux-androideabi \
            --all-features
          mv ./build/armv7-linux-androideabi/release/carch \
             ./build/armv7-linux-androideabi/release/carch-armv7-android

      - name: Upload Android binaries as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-binaries
          path: |
            ./build/aarch64-linux-android/release/carch-aarch64-android
            ./build/armv7-linux-androideabi/release/carch-armv7-android
          retention-days: 1

      - name: Upload Android binaries to release
        run: |
          gh release upload ${{ github.event.inputs.tag_version }} \
            ./build/aarch64-linux-android/release/carch-aarch64-android \
            ./build/armv7-linux-androideabi/release/carch-armv7-android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
