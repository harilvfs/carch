name: Android Build

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Release tag to upload assets to (e.g., v1.1.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-12-31
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Install cross
        run: cargo install cross

      - name: Build aarch64 Android binary
        run: |
          cross build \
            --release \
            --target-dir=build \
            --target=aarch64-linux-android \
            --all-features
          mv ./build/aarch64-linux-android/release/carch \
             ./build/aarch64-linux-android/release/carch-aarch64-android

      - name: Build armv7 Android binary
        run: |
          cross build \
            --release \
            --target-dir=build \
            --target=armv7-linux-androideabi \
            --all-features
          mv ./build/armv7-linux-androideabi/release/carch \
             ./build/armv7-linux-androideabi/release/carch-armv7-android

      - name: Upload to GitHub Release
        run: |
          gh release upload ${{ github.event.inputs.tag_version }} \
            ./build/aarch64-linux-android/release/carch-aarch64-android \
            ./build/armv7-linux-androideabi/release/carch-armv7-android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
