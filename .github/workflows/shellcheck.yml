name: ShellCheck

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.sh'

  pull_request:
    branches: [ main ]
    paths:
      - '**/*.sh'

  workflow_dispatch:

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -type f -name "*.sh" -not -path "./target/*" -not -path "./.git/*" -not -path "./build/*" -print0 | \
          xargs -0 shellcheck --severity=warning
