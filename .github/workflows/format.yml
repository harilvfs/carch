name: Format Check
on:
  push:
    branches: [ main ]
    paths:
      - '**/*.sh'
      - '**/*.py'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.sh'
      - '**/*.py'
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    - name: Install shfmt
      run: go install mvdan.cc/sh/v3/cmd/shfmt@latest
    - name: Install ruff
      run: pip install ruff
    - name: Check formatting
      run: |
        python3 format.py --check
        git diff --exit-code
